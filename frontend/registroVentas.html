<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SmartControl | Registrar Venta</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/registroVentas.css">
</head>

<body>
  <main class="sales-shell">
    <aside class="sidebar" aria-label="Menu principal">
      <div class="brand">
        <img class="brand__icon js-icon" data-icon="logo" src="" alt="SmartControl">
        <span class="brand__name">SmartControl</span>
      </div>

      <nav class="sidebar__nav">
        <a class="nav-item" href="dashboard.html">
          <img class="nav-item__icon js-icon" data-icon="dashboard" src="" alt="">
          <span>Dashboard</span>
        </a>
        <a class="nav-item nav-item--active" href="registroVentas.html" aria-current="page">
          <img class="nav-item__icon js-icon" data-icon="sale" src="" alt="">
          <span>Registrar Venta</span>
        </a>
        <a class="nav-item" href="#">
          <img class="nav-item__icon js-icon" data-icon="expense" src="" alt="">
          <span>Registrar Gasto</span>
        </a>
        <a class="nav-item" href="#">
          <img class="nav-item__icon js-icon" data-icon="inventory" src="" alt="">
          <span>Inventario</span>
        </a>
        <a class="nav-item" href="#">
          <img class="nav-item__icon js-icon" data-icon="corresponsal" src="" alt="">
          <span>Corresponsal</span>
        </a>
        <a class="nav-item" href="#">
          <img class="nav-item__icon js-icon" data-icon="shortcuts" src="" alt="">
          <span>Accesos Directos</span>
        </a>
        <a class="nav-item" href="#">
          <img class="nav-item__icon js-icon" data-icon="notifications" src="" alt="">
          <span>Notificaciones</span>
        </a>
      </nav>

      <button class="logout-button" type="button">
        <img class="logout-button__icon js-icon" data-icon="logout" src="" alt="">
        <span>Cerrar Sesión</span>
      </button>
    </aside>

    <section class="sales-content">
      <div class="sales-inner">
        <h1>Registrar Venta</h1>

        <form class="sale-card" id="sale-form" autocomplete="off">
          <div class="sale-card__title">
            <img class="sale-card__title-icon js-icon" data-icon="sale" src="" alt="">
            <span>Producto del inventario (opcional)</span>
          </div>

          <label class="field field--with-icon" for="product">
            <span class="visually-hidden">Producto</span>
            <img class="field__icon js-icon" data-icon="search" src="" alt="">
            <input id="product" name="product" type="search" placeholder="Buscar producto o venta manual">
          </label>

          <label class="field-group" for="sale-type">
            <span>Tipo de venta</span>
            <select id="sale-type" name="saleType" required>
              <option value="" selected disabled>Seleccionar tipo</option>
              <option value="Papelería">Papelería</option>
              <option value="Copias">Copias</option>
              <option value="Impresiones">Impresiones</option>
              <option value="Internet">Internet</option>
              <option value="Recargas">Recargas</option>
              <option value="Retiros">Retiros</option>
              <option value="Pago servicios">Pago servicios</option>
              <option value="Comida">Comida</option>
              <option value="Juguetería">Juguetería</option>
              <option value="Otros">Otros</option>
            </select>
          </label>

          <label class="field-group" for="description">
            <span>Descripción</span>
            <input id="description" name="description" type="text" placeholder="Ej: venta de cuadernos" required>
          </label>

          <label class="field-group" for="quantity">
            <span>Cantidad (opcional)</span>
            <input id="quantity" name="quantity" type="number" min="1" step="1" placeholder="Ej: 2">
          </label>


          <label class="field-group" for="amount">
            <span>Monto</span>
            <input id="amount" name="amount" type="number" min="0" step="100" placeholder="0" required>
          </label>

          <label class="field-group" for="payment-method">
            <span>Medio de pago</span>
            <select id="payment-method" name="paymentMethod" required>
              <option value="" selected disabled>Seleccionar medio</option>
              <option value="Efectivo">Efectivo</option>
              <option value="Nequi">Nequi</option>
              <option value="Transferencia">Transferencia</option>
              <option value="Tarjeta">Tarjeta</option>
            </select>
          </label>

          <p class="form-message" id="form-message" role="status" aria-live="polite"></p>

          <button class="save-button" type="submit">
            <img class="save-button__icon js-icon" data-icon="save" src="" alt="">
            <span>Guardar Venta</span>
          </button>
        </form>
      </div>
    </section>
  </main>

  <div class="success-modal" id="success-modal" hidden>
    <div class="success-modal__backdrop"></div>

    <div class="success-modal__card" role="dialog" aria-modal="true" aria-label="Venta registrada">
      <div class="success-modal__icon">
        <span></span>
      </div>

      <p>¡Venta registrada con éxito!</p>
    </div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/registroVentas.js"></script>
</body>

</html>
