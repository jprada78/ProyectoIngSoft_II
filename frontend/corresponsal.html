<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SmartControl | Corresponsal Bancario</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/corresponsal.css"> <!-- reutilizamos estilos -->
</head>

<body>
    <main class="sales-shell">
        <aside class="sidebar" aria-label="Menu principal">
        <div class="brand">
            <img class="brand__icon js-icon" data-icon="logo" src="" alt="SmartControl">
            <span class="brand__name">SmartControl</span>
        </div>

        <nav class="sidebar__nav">
            <a class="nav-item" href="dashboard.html">
            <img class="nav-item__icon js-icon" data-icon="dashboard" src="" alt="">
            <span>Dashboard</span>
            </a>
            <a class="nav-item" href="registroVentas.html" aria-current="page">
            <img class="nav-item__icon js-icon" data-icon="sale" src="" alt="">
            <span>Registrar Venta</span>
            </a>
            <a class="nav-item" href="registroGasto.html">
            <img class="nav-item__icon js-icon" data-icon="expense" src="" alt="">
            <span>Registrar Gasto</span>
            </a>
            <a class="nav-item" href="#">
            <img class="nav-item__icon js-icon" data-icon="inventory" src="" alt="">
            <span>Inventario</span>
            </a>
            <a class="nav-item nav-item--active" href="corresponsal.html">
            <img class="nav-item__icon js-icon" data-icon="corresponsal" src="" alt="">
            <span>Corresponsal</span>
            </a>
            <a class="nav-item" href="acceso_directo.html">
            <img class="nav-item__icon js-icon" data-icon="shortcuts" src="" alt="">
            <span>Accesos Directos</span>
            </a>
            <a class="nav-item" href="#">
            <img class="nav-item__icon js-icon" data-icon="notifications" src="" alt="">
            <span>Notificaciones</span>
            </a>
        </nav>
    </aside>

    <!-- CONTENIDO -->
    <section class="sales-content">
      <div class="sales-inner">
        <h1>Corresponsal Bancario</h1>

        <form class="sale-card" id="corresponsal-form">

          <!-- Tipo -->
          <label class="field-group">
            <span>Tipo de transacción</span>
            <select required>
              <option value="" disabled selected>Seleccionar tipo</option>
              <option>Retiro</option>
              <option>Recarga</option>
              <option>Pago de servicios</option>
              <option>Pago de credito</option>
              <option>Otros</option>
            </select>
          </label>

          <!-- Entidad -->
          <label class="field-group">
            <span>Entidad</span>
            <select required>
              <option value="" disabled selected>Seleccionar entidad</option>
              <option>Bancolombia</option>
              <option>Davivienda</option>
              <option>Nequi</option>
              <option>BBVA</option>
              <option>Banco de Bogotá</option>
              <option>Efecty</option>
              <option>Otros</option>
              <option>PSE</option>
              <option>PTM</option>
            </select>
          </label>

          <!-- Monto -->
          <label class="field-group">
            <span>Monto</span>
            <input type="number" min="0" placeholder="0" required>
          </label>

          <!-- Comisión -->
          <label class="field-group">
            <span>Comisión ganada</span>
            <input type="number" min="0" placeholder="0">
          </label>

          <button class="save-button" type="submit">
            Guardar Transacción
          </button>

        </form>
      </div>
    </section>

  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/corresponsal.js"></script>
</body>
</html>
