<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SmartControl | Agregar Producto</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/agregarProd.css">
</head>
<body>
  <button class="mobile-menu-button" type="button" aria-label="Abrir menú" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div class="sidebar-overlay" hidden></div>

  <main class="product-shell">
    <aside class="sidebar" id="sidebar" aria-label="Menu principal">
      <div class="brand">
        <img class="brand__icon js-icon" data-icon="logo" src="" alt="SmartControl">
        <span class="brand__name">SmartControl</span>
        <button class="sidebar-close-button" type="button" aria-label="Cerrar menú">×</button>
      </div>

      <nav class="sidebar__nav">
        <a class="nav-item" href="dashboard.html">
          <img class="nav-item__icon js-icon" data-icon="dashboard" src="" alt="">
          <span>Dashboard</span>
        </a>
        <a class="nav-item" href="registroVentas.html">
          <img class="nav-item__icon js-icon" data-icon="sale" src="" alt="">
          <span>Registrar Venta</span>
        </a>
        <a class="nav-item" href="registroGasto.html">
          <img class="nav-item__icon js-icon" data-icon="expense" src="" alt="">
          <span>Registrar Gasto</span>
        </a>
        <a class="nav-item nav-item--active" href="inventario.html" aria-current="page">
          <img class="nav-item__icon js-icon" data-icon="inventory" src="" alt="">
          <span>Inventario</span>
        </a>
        <a class="nav-item" href="corresponsal.html">
          <img class="nav-item__icon js-icon" data-icon="corresponsal" src="" alt="">
          <span>Corresponsal</span>
        </a>
        <a class="nav-item" href="acceso_directo.html">
          <img class="nav-item__icon js-icon" data-icon="shortcuts" src="" alt="">
          <span>Accesos Directos</span>
        </a>
        <a class="nav-item" href="#">
          <img class="nav-item__icon js-icon" data-icon="notifications" src="" alt="">
          <span>Notificaciones</span>
        </a>
      </nav>

      <button class="logout-button" type="button">
        <img class="logout-button__icon js-icon" data-icon="logout" src="" alt="">
        <span>Cerrar Sesión</span>
      </button>
    </aside>

    <section class="product-content">
      <div class="product-inner">
        <header class="page-header">
          <div>
            <h1>Inventario</h1>
            <p>Gestión y control de productos</p>
          </div>

          <a class="back-link" href="inventario.html">Volver al inventario</a>
        </header>

        <form class="product-card" id="product-form" autocomplete="off">
          <h2 id="form-title">Nuevo Producto</h2>

          <div class="form-grid">
            <label class="field-group" for="product-name">
              <span>Nombre del producto</span>
              <input id="product-name" name="name" type="text" required>
            </label>

            <label class="field-group" for="product-category">
              <span>Categoría</span>
              <select id="product-category" name="category" required>
                <option value="Papelería">Papelería</option>
                <option value="Juguetería">Juguetería</option>
                <option value="Comida">Comida</option>
                <option value="Otros">Otros</option>
              </select>
            </label>

            <label class="field-group" for="sale-price">
              <span>Precio de venta</span>
              <input id="sale-price" name="salePrice" type="number" min="0" step="100" required>
            </label>

            <label class="field-group" for="cost">
              <span>Costo</span>
              <input id="cost" name="cost" type="number" min="0" step="100" required>
            </label>

            <label class="field-group" for="stock">
              <span>Cantidad en Stock</span>
              <input id="stock" name="stock" type="number" min="0" step="1" required>
            </label>

            <label class="field-group" for="min-stock">
              <span>Stock mínimo</span>
              <input id="min-stock" name="minStock" type="number" min="0" step="1" required>
            </label>
          </div>

          <p class="form-message" id="form-message" role="status" aria-live="polite"></p>

          <div class="form-actions">
            <a class="cancel-button" href="inventario.html">Cancelar</a>

            <button class="save-button" type="submit">
              <span class="save-button__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M5 4H17L20 7V20H4V5C4 4.45 4.45 4 5 4Z"></path>
                  <path d="M8 4V10H16V4"></path>
                  <path d="M8 20V14H16V20"></path>
                </svg>
              </span>
              <span id="save-button-text">Guardar</span>
            </button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script src="js/agregarProd.js"></script>
</body>
</html>
