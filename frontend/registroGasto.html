<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SmartControl | Registrar Gasto</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/registrarGasto.css">
</head>

<body>

  <button class="mobile-menu-button" type="button" aria-label="Abrir menú" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div class="sidebar-overlay" hidden></div>

  <main class="sales-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar" aria-label="Menu principal">
      <div class="brand">
        <img class="brand__icon js-icon" data-icon="logo" src="" alt="SmartControl">
        <span class="brand__name">SmartControl</span>
        <button class="sidebar-close-button" type="button" aria-label="Cerrar menú">×</button>
      </div>


      <nav class="sidebar__nav">
        <a class="nav-item" href="dashboard.html">
          <img class="nav-item__icon js-icon" data-icon="dashboard" src="" alt="">
          <span>Dashboard</span>
        </a>

        <a class="nav-item" href="registroVentas.html">
          <img class="nav-item__icon js-icon" data-icon="sale" src="" alt="">
          <span>Registrar Venta</span>
        </a>

        <a class="nav-item nav-item--active" href="registroGasto.html" aria-current="page">
          <img class="nav-item__icon js-icon" data-icon="expense" src="" alt="">
          <span>Registrar Gasto</span>
        </a>

        <a class="nav-item" href="#">
          <img class="nav-item__icon js-icon" data-icon="inventory" src="" alt="">
          <span>Inventario</span>
        </a>

        <a class="nav-item" href="corresponsal.html">
          <img class="nav-item__icon js-icon" data-icon="corresponsal" src="" alt="">
          <span>Corresponsal</span>
        </a>
        <a class="nav-item" href="acceso_directo.html">
          <img class="nav-item__icon js-icon" data-icon="shortcuts" src="" alt="">
          <span>Accesos Directos</span>
        </a>
        <a class="nav-item" href="#">
          <img class="nav-item__icon js-icon" data-icon="notifications" src="" alt="">
          <span>Notificaciones</span>
        </a>
      </nav>

      <button class="logout-button" type="button">
        <img class="logout-button__icon js-icon" data-icon="logout" src="" alt="">
        <span>Cerrar Sesión</span>
      </button>
    </aside>

    <!-- CONTENIDO -->
    <section class="sales-content">
      <div class="sales-inner">

        <h1>Registrar Gasto</h1>

        <form class="sale-card" id="expense-form" autocomplete="off">

          <div class="sale-card__title">
            <img class="sale-card__title-icon js-icon" data-icon="expense" src="" alt="">
            <span>Producto del inventario (opcional)</span>
          </div>

          <label class="field field--with-icon" for="product">
            <span class="visually-hidden">Producto</span>
            <img class="field__icon js-icon" data-icon="search" src="" alt="">
            <input id="product" name="product" type="search"
              placeholder="Buscar producto o gasto manual del inventario">
          </label>

          <label class="field-group" for="description">
            <span>Descripción</span>
            <input id="description" name="description" type="text" placeholder="Ej: Compra de cuadernos" required>
          </label>

          <label class="field-group" for="category">
            <span>Categoría</span>
            <select id="category" name="category" required>
              <option value="" selected disabled>Seleccionar categoría</option>
              <option value="Inventario">Inventario</option>
              <option value="Servicios">Servicios</option>
              <option value="Arriendo">Arriendo</option>
              <option value="Salarios">Salarios</option>
              <option value="Mantenimiento">Mantenimiento</option>
              <option value="Transporte">Transporte</option>
              <option value="Otros">Otros</option>
            </select>
          </label>

          <label class="field-group" for="quantity">
            <span>Cantidad (Opcional)</span>
            <input id="quantity" name="quantity" type="number" min="1" step="1" placeholder="Ej: 2">
          </label>

          <label class="field-group" for="amount">
            <span>Monto o valor unitario</span>
            <input id="amount" name="amount" type="number" min="0" step="100" placeholder="0" required>
            <small class="field-help">
              Si la categoría es Inventario, este valor se multiplicará por la cantidad.
            </small>
          </label>


          <p class="form-message" id="form-message"></p>

          <button class="save-button save-button--gasto" type="submit">
            <img class="save-button__icon js-icon" data-icon="save" src="" alt="">
            <span>Guardar Gasto</span>
          </button>

        </form>
      </div>
    </section>
  </main>

  <!-- MODAL DE ÉXITO -->
  <div class="success-modal" id="success-modal" hidden>
    <div class="success-modal__backdrop"></div>

    <div class="success-modal__card">
      <div class="success-modal__icon">
        <span></span>
      </div>

      <p>¡Gasto registrado con éxito!</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/registroGasto.js"></script>

</body>

</html>
```
